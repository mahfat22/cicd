name: Basic Services
on: workflow_dispatch
jobs:
  basic_services_job:
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:latest
        ports:
          - 6379:6379

    steps:
      - name: install redis-cli
        run: sudo apt-get update && sudo apt-get install -y redis-tools

      - name: Test Redis Connection
        run: redis-cli -h localhost ping

